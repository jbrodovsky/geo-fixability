# sweep_config.yaml
# Parameter sweep configuration for the geo-fixability pipeline.
#
# Each key under 'sweep' defines a list of values to iterate over.
# All combinations are taken (Cartesian product).
#
# Full grid: 7 × 5 × 8 × 4 × 4 × 4 × 4 × 8 = 573,440 scenarios
# Use --quick to restrict to first 2 values per dimension (256 scenarios).
#
# ins_drift_rate is in m/s:
#   0.02778 m/s ≈ 0.1 km/hr
#   0.13889 m/s ≈ 0.5 km/hr
#   0.27778 m/s ≈ 1.0 km/hr

sweep:
  sigma_init:         [10, 25, 50, 100, 250, 500, 1000]          # initial 1-sigma uncertainty [m]
  speed:              [1, 2, 5, 10, 20]                                # vehicle speed [m/s]
  duration:           [300, 600, 900, 1200, 1800, 2400, 2700, 3600]    # trajectory duration [s]
  ins_drift_rate:     [0.02778, 0.06945, 0.1388, 0.2778]               # INS drift rate [m/s] (0.1 km/hr, 0.25 km/hr, 0.5 km/hr, 1.0 km/hr)
  sigma_meas:         [0.01, 0.05, 0.1, 0.5]           # measurement noise [field units]
  beta:               [0.7, 1.3, 2.0, 3.5]             # spectral PSD exponent
  correlation_length: [300, 1000, 2500, 4500]          # spatial feature scale [m]
  dx:                 [1, 5, 10, 25, 50, 100, 250, 500]       # map resolution [m/pixel]

fixed:
  dt: 1.0
  seed: 42
  trajectory_type: "auto"    # auto | star | lawnmower | spiral | straight | figure8
  run_pf: false              # set true to add particle filter (much slower)
  n_particles: 1000
  n_pf_mc: 5
  max_map_npix: 2048         # hard cap on field size [pixels per side]

output:
  outdir: "data/sweep"
  filename: "sweep_results.csv"

# ---------------------------------------------------------------------------
# PF verification grid
# ---------------------------------------------------------------------------
# Empirically verifies the PCRB sweep results with a Bootstrap Particle Filter.
# Uses the same parameter dimensions as 'sweep' above, but with fewer values
# per dimension so the run stays tractable (PF is ~10–50× slower than PCRB).
# All values here are subsets of those in 'sweep' above.
#
# Full grid: 3 × 3 × 3 × 3 × 3 × 3 × 3 × 3 = 6,561 scenarios
# Use --quick to restrict to the first 2 values per dimension (256 scenarios).
pf_verification:
  sweep:
    sigma_init:         [10 , 25, 50, 100, 250, 500, 1000]          # initial 1-sigma uncertainty [m]
    speed:              [1, 2, 5, 10, 20]                                # vehicle speed [m/s]
    duration:           [300, 600, 900, 1200, 1800, 2400, 2700, 3600]    # trajectory duration [s]
    ins_drift_rate:     [0.02778, 0.06945, 0.1388, 0.2778]               # INS drift rate [m/s] (0.1 km/hr, 0.25 km/hr, 0.5 km/hr, 1.0 km/hr)
    sigma_meas:         [0.01, 0.05, 0.1, 0.5]           # measurement noise [field units]
    beta:               [0.7, 1.3, 2.0, 3.5]             # spectral PSD exponent
    correlation_length: [300, 1000, 2500, 4500]          # spatial feature scale [m]
    dx:                 [1, 5, 10, 25, 50, 100, 250, 500]       # map resolution [m/pixel]

  fixed:
    n_particles: 500   # reduced from 1000 to keep runtime tractable
    n_mc: 10           # MC runs per configuration
    n_workers: 10      # cap parallel workers to limit memory use (default: os.cpu_count())
